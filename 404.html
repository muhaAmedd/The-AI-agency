<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | The AI Agency</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to The AI Agency homepage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,400;0,9..40,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --c1: #00076f;
            --c2: #44008b;
            --c3: #9f45b0;
            --c4: #e54ed0;
            --c5: #ffe4f2;
            --bg: #000510;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--c5);
            overflow: hidden;
            cursor: none;
        }

        /* —"?—"? Custom Cursor —"?—"? */
        #cursor {
            position: fixed; width: 10px; height: 10px;
            background: var(--c4); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: width .15s, height .15s;
        }
        #cursor-ring {
            position: fixed; width: 40px; height: 40px;
            pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
        }
        #cursor-ring svg { width: 100%; height: 100%; overflow: visible; }

        /* —"?—"? Canvas Background —"?—"? */
        #bg-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* —"?—"? Noise Overlay —"?—"? */
        #noise {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* —"?—"? Main Layout —"?—"? */
        #page {
            position: relative; z-index: 2;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px 6%;
            opacity: 0;
        }

        /* —"?—"? Hex decoration —"?—"? */
        .hex-deco {
            position: absolute; pointer-events: none;
            opacity: 0;
        }
        .hex-deco svg { display: block; }
        #hex-tl { top: 8%; left: 5%; }
        #hex-tr { top: 5%; right: 8%; }
        #hex-bl { bottom: 10%; left: 8%; }
        #hex-br { bottom: 6%; right: 5%; }
        #hex-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0;
            z-index: -1;
        }

        /* —"?—"? Glitch 404 —"?—"? */
        .err-num-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .err-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(7rem, 22vw, 18rem);
            line-height: 0.88;
            letter-spacing: -4px;
            color: transparent;
            -webkit-text-stroke: 2px rgba(229, 78, 208, 0.6);
            position: relative;
            z-index: 2;
            user-select: none;
        }

        .err-num-fill {
            position: absolute; inset: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(7rem, 22vw, 18rem);
            line-height: 0.88;
            letter-spacing: -4px;
            background: linear-gradient(135deg, var(--c2) 0%, var(--c3) 50%, var(--c4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.25;
            z-index: 1;
            user-select: none;
        }

        /* Glitch layers */
        .err-num::before,
        .err-num::after {
            content: '404';
            position: absolute; inset: 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: inherit;
            line-height: inherit;
            letter-spacing: inherit;
        }
        .err-num::before {
            color: var(--c4);
            -webkit-text-stroke: 0;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
            animation: glitch-top 3.5s infinite;
            opacity: 0.7;
        }
        .err-num::after {
            color: var(--c2);
            -webkit-text-stroke: 0;
            clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%);
            animation: glitch-bot 3.5s infinite;
            opacity: 0.7;
        }

        @keyframes glitch-top {
            0%, 88%, 100% { transform: translate(0, 0); opacity: 0; }
            89%            { transform: translate(-6px, -3px); opacity: 0.7; }
            91%            { transform: translate(6px, 3px); opacity: 0.7; }
            93%            { transform: translate(-4px, 0); opacity: 0.7; }
            95%            { transform: translate(0, 0); opacity: 0; }
        }
        @keyframes glitch-bot {
            0%, 88%, 100% { transform: translate(0, 0); opacity: 0; }
            90%            { transform: translate(6px, 2px); opacity: 0.7; }
            92%            { transform: translate(-6px, -2px); opacity: 0.7; }
            94%            { transform: translate(4px, 0); opacity: 0.7; }
            96%            { transform: translate(0, 0); opacity: 0; }
        }

        /* —"?—"? Scan line —"?—"? */
        .scan-line {
            position: absolute; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(229,78,208,0.6), transparent);
            top: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes scan {
            0%   { top: 0%; opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* —"?—"? Eyebrow —"?—"? */
        .err-eyebrow {
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 0.6rem; letter-spacing: 5px;
            text-transform: uppercase; color: var(--c4);
            margin-bottom: 20px; opacity: 0;
        }
        .err-eyebrow::before, .err-eyebrow::after {
            content: ''; display: block;
            width: 28px; height: 1px; background: var(--c4);
        }

        /* —"?—"? Sub text —"?—"? */
        .err-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2.8rem);
            letter-spacing: 3px; color: var(--c5);
            margin-bottom: 16px; opacity: 0;
        }
        .err-desc {
            font-size: 0.95rem; line-height: 1.8;
            color: rgba(255, 228, 242, 0.45);
            max-width: 440px; margin: 0 auto 44px;
            opacity: 0; font-weight: 300;
        }

        /* —"?—"? Actions —"?—"? */
        .err-actions {
            display: flex; gap: 20px;
            align-items: center; justify-content: center;
            flex-wrap: wrap; opacity: 0;
        }

        .btn-home {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--c2), var(--c4));
            border: none; border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; color: #fff;
            text-decoration: none; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 30px rgba(229,78,208,0.25);
            position: relative; overflow: hidden;
        }
        .btn-home::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(255,255,255,0.12);
            transform: translateX(-110%) skewX(-20deg);
            transition: transform 0.5s;
        }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(229,78,208,0.45); }
        .btn-home:hover::after { transform: translateX(110%) skewX(-20deg); }

        .btn-back {
            font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,228,242,0.45);
            background: none; border: none;
            cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
            transition: color 0.3s;
        }
        .btn-back span {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1px solid rgba(255,228,242,0.3);
            font-size: 0.7rem;
        }
        .btn-back:hover { color: var(--c4); }

        /* —"?—"? Brand header —"?—"? */
        #brand-bar {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 20px 6%;
            display: flex; align-items: center; gap: 14px;
            z-index: 100; opacity: 0;
        }
        .brand-name-404 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700; font-size: 1rem;
            letter-spacing: 3px; color: rgba(255,255,255,0.7);
            text-transform: uppercase; text-decoration: none;
        }

        /* —"?—"? Floating particles —"?—"? */
        .particle {
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 1;
            background: var(--c4); opacity: 0;
        }

        /* —"?—"? Responsive —"?—"? */
        @media (max-width: 600px) {
            .err-num, .err-num::before, .err-num::after { letter-spacing: -2px; }
            .err-desc { font-size: 0.85rem; }
            .btn-home { padding: 12px 28px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-ring">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#44008b"/>
                    <stop offset="100%" stop-color="#e54ed0"/>
                </linearGradient>
            </defs>
            <polygon class="hex-outer" points="30,5 53,18 53,42 30,55 7,42 7,18" fill="none" stroke="url(#cg)" stroke-width="1.5"/>
            <polygon points="30,12 45,21 45,39 30,48 15,39 15,21" fill="none" stroke="url(#cg)" stroke-width="1" opacity="0.5"/>
        </svg>
    </div>

    <canvas id="bg-canvas"></canvas>
    <div id="noise"></div>

    <!-- Brand bar -->
    <div id="brand-bar">
        <a href="index.html" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
            <svg width="32" height="32" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#44008b"/><stop offset="100%" stop-color="#e54ed0"/></linearGradient></defs>
                <polygon points="30,5 53,18 53,42 30,55 7,42 7,18" fill="none" stroke="url(#bg1)" stroke-width="1.5"/>
                <polygon points="30,12 45,21 45,39 30,48 15,39 15,21" fill="none" stroke="url(#bg1)" stroke-width="1" opacity="0.6"/>
                <circle cx="30" cy="30" r="3" fill="#e54ed0"/>
            </svg>
            <span class="brand-name-404">The AI Agency</span>
        </a>
    </div>

    <!-- Hex decorations -->
    <div class="hex-deco" id="hex-tl">
        <svg width="120" height="120" viewBox="0 0 120 120">
            <defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#44008b" stop-opacity="0.5"/><stop offset="100%" stop-color="#e54ed0" stop-opacity="0.15"/></linearGradient></defs>
            <polygon points="60,8 104,32 104,80 60,104 16,80 16,32" fill="none" stroke="url(#hg)" stroke-width="1"/>
            <polygon points="60,22 92,40 92,76 60,94 28,76 28,40" fill="none" stroke="url(#hg)" stroke-width="0.6" opacity="0.5"/>
        </svg>
    </div>
    <div class="hex-deco" id="hex-tr">
        <svg width="180" height="180" viewBox="0 0 180 180">
            <polygon points="90,10 160,50 160,130 90,170 20,130 20,50" fill="none" stroke="rgba(229,78,208,0.2)" stroke-width="1"/>
            <polygon points="90,30 140,58 140,114 90,142 40,114 40,58" fill="none" stroke="rgba(159,69,176,0.15)" stroke-width="0.7"/>
            <polygon points="90,50 120,66 120,100 90,116 60,100 60,66" fill="none" stroke="rgba(68,0,139,0.2)" stroke-width="0.5"/>
        </svg>
    </div>
    <div class="hex-deco" id="hex-bl">
        <svg width="90" height="90" viewBox="0 0 90 90">
            <polygon points="45,6 78,24 78,60 45,78 12,60 12,24" fill="none" stroke="rgba(229,78,208,0.3)" stroke-width="1"/>
        </svg>
    </div>
    <div class="hex-deco" id="hex-br">
        <svg width="150" height="150" viewBox="0 0 150 150">
            <polygon points="75,8 132,40 132,104 75,136 18,104 18,40" fill="none" stroke="rgba(159,69,176,0.25)" stroke-width="1"/>
            <polygon points="75,25 112,46 112,90 75,111 38,90 38,46" fill="none" stroke="rgba(229,78,208,0.12)" stroke-width="0.7"/>
        </svg>
    </div>

    <!-- Center hex glow -->
    <div id="hex-center">
        <svg width="600" height="600" viewBox="0 0 600 600">
            <defs>
                <radialGradient id="hexglow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#44008b" stop-opacity="0.18"/>
                    <stop offset="100%" stop-color="#44008b" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <polygon points="300,30 524,155 524,405 300,530 76,405 76,155" fill="url(#hexglow)"/>
            <polygon points="300,30 524,155 524,405 300,530 76,405 76,155" fill="none" stroke="rgba(229,78,208,0.08)" stroke-width="1"/>
            <polygon points="300,80 490,185 490,375 300,480 110,375 110,185" fill="none" stroke="rgba(159,69,176,0.06)" stroke-width="1"/>
            <polygon points="300,130 456,215 456,345 300,430 144,345 144,215" fill="none" stroke="rgba(68,0,139,0.08)" stroke-width="1"/>
        </svg>
    </div>

    <!-- Main content -->
    <main id="page">
        <div class="scan-line"></div>

        <div class="err-eyebrow">System Error Detected</div>

        <div class="err-num-wrap">
            <div class="err-num-fill">404</div>
            <div class="err-num">404</div>
        </div>

        <div class="err-title">Signal Lost</div>

        <p class="err-desc">
            The page you're navigating to doesn't exist in this dimension.<br>
            It may have been moved, deleted, or never existed.
        </p>

        <div class="err-actions">
            <a href="index.html" class="btn-home">Return to Base</a>
            <a href="javascript:history.back()" class="btn-back">
                <span>═—</span> Go Back
            </a>
        </div>
    </main>

    <script>
        // —"?—"? Cursor —"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?
        const cursor = document.getElementById('cursor');
        const ring   = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        gsap.ticker.add(() => {
            cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
            rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        });
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => gsap.to(cursor, { width: 6, height: 6, duration: 0.2 }));
            el.addEventListener('mouseleave', () => gsap.to(cursor, { width: 10, height: 10, duration: 0.2 }));
        });

        // —"?—"? Stars Canvas —"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, stars = [];

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for (let i = 0; i < 180; i++) {
            stars.push({
                x: Math.random(), y: Math.random(),
                r: Math.random() * 0.9 + 0.2,
                a: Math.random(),
                speed: Math.random() * 0.0003 + 0.0001
            });
        }

        function drawStars(t) {
            ctx.clearRect(0, 0, W, H);
            stars.forEach(s => {
                s.a = 0.15 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.x * 50));
                ctx.beginPath();
                ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,228,242,${s.a})`;
                ctx.fill();
            });
        }

        // —"?—"? Floating particles —"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?
        const colors = ['#e54ed0','#9f45b0','#44008b'];
        const particles = [];
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};filter:blur(1px)`;
            document.body.appendChild(p);
            particles.push(p);
        }

        // —"?—"? Entrance Animation —"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?
        const tl = gsap.timeline({ delay: 0.2 });

        tl.to('#brand-bar', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, 0);
        tl.to('#hex-center', { opacity: 1, scale: 1, duration: 1.5, ease: 'power2.out' }, 0);
        tl.to('#hex-tl', { opacity: 1, x: 0, y: 0, duration: 1, ease: 'expo.out' }, 0.2);
        tl.to('#hex-tr', { opacity: 1, x: 0, y: 0, duration: 1, ease: 'expo.out' }, 0.3);
        tl.to('#hex-bl', { opacity: 1, x: 0, y: 0, duration: 1, ease: 'expo.out' }, 0.35);
        tl.to('#hex-br', { opacity: 1, x: 0, y: 0, duration: 1, ease: 'expo.out' }, 0.4);
        tl.to('#page', { opacity: 1, duration: 0.5 }, 0.1);
        tl.to('.err-eyebrow', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.4);
        tl.from('.err-num-wrap', { y: 60, opacity: 0, duration: 1.2, ease: 'expo.out' }, 0.5);
        tl.to('.err-title', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.9);
        tl.to('.err-desc', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 1.1);
        tl.to('.err-actions', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 1.3);

        // Set initial from states
        gsap.set(['#brand-bar'], { opacity: 0, y: -20 });
        gsap.set(['#hex-tl'], { opacity: 0, x: -40, y: -40 });
        gsap.set(['#hex-tr'], { opacity: 0, x: 40, y: -40 });
        gsap.set(['#hex-bl'], { opacity: 0, x: -40, y: 40 });
        gsap.set(['#hex-br'], { opacity: 0, x: 40, y: 40 });
        gsap.set(['#hex-center'], { opacity: 0, scale: 0.8 });
        gsap.set(['.err-eyebrow', '.err-title', '.err-desc', '.err-actions'], { opacity: 0, y: 20 });

        // Particles float in
        particles.forEach((p, i) => {
            gsap.to(p, {
                opacity: Math.random() * 0.5 + 0.1,
                duration: 1.5,
                delay: 0.8 + i * 0.05,
                ease: 'power2.out'
            });
            gsap.to(p, {
                y: `${(Math.random() - 0.5) * 80}px`,
                x: `${(Math.random() - 0.5) * 40}px`,
                duration: 4 + Math.random() * 5,
                delay: i * 0.1,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
        });

        // Hex corner subtle pulse
        gsap.to(['.hex-deco'], {
            opacity: 0.6,
            duration: 2.5,
            repeat: -1, yoyo: true,
            ease: 'sine.inOut',
            stagger: 0.4,
            delay: 2
        });

        // —"?—"? RAF loop —"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?—"?
        function loop(t) {
            drawStars(t / 1000);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
